services:
  db:
    image: postgres:16
    container_name: hcp-crm-postgres
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - hcp_crm_pg:/var/lib/postgresql/data

volumes:
  hcp_crm_pg:
